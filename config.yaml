server:
    listen_addr: ":8080"

backend:
    url: "http://localhost:8081"

# GET, HEAD, OPTIONS => max body 0
# POST, PUT, PATCH => allow body
# DELETE => small body 64kb
request_limits:
    # default max body size for each route
    default_max_body_bytes: 1048576

    # max body size for each routes
    methods:
        GET: 0
        HEAD: 0
        OPTIONS: 0
        DELETE: 65536 # 64kb
        POST: 1048576 # 1mb
        PUT: 2097152 # 2mb
        PATCH: 1048576 # 1mb

    # we can give specific routes a different max body size
    routes:
        "/api/auth/login":
            max_body_bytes: 16384 # 16kb

        "/api/auth/register":
            max_body_bytes: 32768 # 32kb

        "/api/files/upload":
            max_body_bytes: 10485760 # 10mb

# Rate Limiter algorithm is token bucket
rate_limits:
    enabled: true

    default:
        capacity: 100
        refill_rate_per_second: 10
        key: ip

    routes:
        "/api/auth/login":
            capacity: 5
            refill_rate_per_second: 0.1
            key: ip

        "/api/auth/register":
            capacity: 3
            refill_rate_per_second: 0.05
            key: ip

        "/api/files/upload":
            capacity: 5
            refill_rate_per_second: 0.01
            key: user_or_ip

jwt:
    enabled: true
    secret: "super-secret-key"
    protected_routes:
        - "/api/users"
        - "/api/orders"
    skip_routes:
        - "/api/auth/login"
        - "/api/auth/register"
banned_ips:
    - "10.0.0.5"
scanner:
    enabled: true
    scan_query: true
    scan_headers: true
    scan_body: true
cors:
    enabled: true
    allowed_hosts:
        - "api.example.com"
        - "localhost:8080"
    allowed_origins:
        - "https://example.com"
    allowed_methods:
        - GET
        - PUT
        - POST
        - PATCH
        - DELETE
        - OPTIONS
    allowed_headers:
        - Authorization
        - Content-Type
        - X-Request-ID
    allow_credentials: false
    max_age_seconds: 600

trusted_proxies:
    - "127.0.0.1"
    - "10.0.0.10"
    - "10.0.1.0/24"
