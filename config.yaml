server:
    listen_addr: ":8080"

backend:
    url: "http://localhost:8081"
    dial_timeout_seconds: 5
    response_header_timeout_seconds: 10
    idle_conn_timeout_seconds: 90

# Shared WAF state.
# backend: memory => state is local to this process.
# backend: redis  => rate limits and scanner runtime blocks are shared.
state:
    backend: "memory"
    namespace: "goshield"
    redis:
        addr: "localhost:6379"
        password: ""
        db: 0

# GET, HEAD, OPTIONS => max body 0
# POST, PUT, PATCH => allow body
# DELETE => small body 64kb
request_limits:
    # default max body size for each route
    default_max_body_bytes: 1048576

    # max body size for each routes
    methods:
        GET: 0
        HEAD: 0
        OPTIONS: 0
        DELETE: 65536 # 64kb
        POST: 1048576 # 1mb
        PUT: 2097152 # 2mb
        PATCH: 1048576 # 1mb

    # we can give specific routes a different max body size
    routes:
        "/api/auth/login":
            max_body_bytes: 16384 # 16kb

        "/api/auth/register":
            max_body_bytes: 32768 # 32kb

        "/api/files/upload":
            max_body_bytes: 10485760 # 10mb

# Rate Limiter algorithm is token bucket
rate_limits:
    enabled: true
    key_by: "client_ip" # client_ip, user_id, user_or_ip, or global
    fail_open: false

    routes:
        "/api/auth/login":
            capacity: 100
            refill_rate_per_second: 100

        "/api/auth/register":
            capacity: 50
            refill_rate_per_second: 50

        "/api/files/upload":
            capacity: 10
            refill_rate_per_second: 1

jwt:
    enabled: true
    secret: "replace-this-with-a-long-random-secret"
    issuer: ""
    audience: ""
    protected_routes:
        - "/api/users"
        - "/api/orders"
    skip_routes:
        - "/api/auth/login"
        - "/api/auth/register"
banned_ips:
    - "10.0.0.5"
scanner:
    enabled: true
    scan_query: true
    scan_headers: true
    scan_body: true
    runtime_block_ttl_seconds: 900
cors:
    enabled: true
    allowed_hosts:
        - "api.example.com"
        - "localhost:8080"
    allowed_origins:
        - "https://example.com"
    allowed_methods:
        - GET
        - PUT
        - POST
        - PATCH
        - DELETE
        - OPTIONS
    allowed_headers:
        - Authorization
        - Content-Type
        - X-Request-ID
    allow_credentials: false
    max_age_seconds: 600

trusted_proxies:
    - "127.0.0.1"
    - "10.0.0.10"
    - "10.0.1.0/24"
